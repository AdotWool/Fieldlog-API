openapi: 3.0.3

info: 
  title: Fieldlog API
  version: 1.0.0
  description: Documentation for the fieldlog API

servers:
  - url: https://fieldlog-api.onrender.com/api
    description: Production server
  - url: http://localhost:8080/api
    description: Local development server

tags:
  - name: Logs
    description: Operations related to fieldlogs
  - name: Collections
    description: Operations related to fieldlog collections
  - name: Tags
    description: Operations related to fieldlog tags
  - name: Auth
    description: User authentication endpoints

paths:

  /logs:
    get:
      security:
        - bearerAuth: []
      tags:
        - Logs
      summary: Get all fieldlogs
      description: Retrieve a list of all fieldlogs owned by the user.
      parameters:
        - $ref: '#/components/parameters/QueryName'
        - $ref: '#/components/parameters/QueryCollection'
        - $ref: '#/components/parameters/QueryTag'
      responses:
        '200':
          description: A list of fieldlogs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Fieldlog'

        '401':
          $ref: '#/components/responses/Unauthorized'

        '400':
          description: Invalid name, invalid collection, or invalid tag
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: string
                example:
                  errors:
                    - 'Name must be at least 3 characters'
                    - 'Collection must be at least 3 characters'
                    - 'Tag must be at least 3 characters'
    post:
      security:
        - bearerAuth: []
      tags:
        - Logs
      summary: Create a new fieldlog
      description: Logs a new fieldlog to a collection
      requestBody:
        description: The new fieldlog to create.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Fieldlog'
      responses:
        '201':
          description: Fieldlog successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Fieldlog'

        '401':
          $ref: '#/components/responses/Unauthorized'

        '400':
          $ref: '#/components/responses/InvalidInput'

  /logs/{id}:
    get:
      security:
        - bearerAuth: []
      tags:
        - Logs
      summary: Get a fieldlog by id
      description: Retrieve a single fieldlog by its ID, owned by the user.
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: A single fieldlog
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Fieldlog'
        
        '404':
          $ref: '#/components/responses/NotFound'

        '403':
          $ref: '#/components/responses/Forbidden'
      
        '401':
          $ref: '#/components/responses/Unauthorized'

        '400':
          $ref: '#/components/responses/InvalidId'
    put:
      security:
        - bearerAuth: []
      tags:
        - Logs
      summary: Update a fieldlog
      description: Update a fieldlog name or description 
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        description: Updated fieldlog data.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FieldlogUpdate'
      responses:
        '200':
          description: Updated fieldlog
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Fieldlog'
        
        '404':
          $ref: '#/components/responses/NotFound'

        '403':
          $ref: '#/components/responses/Forbidden'
      
        '401':
          $ref: '#/components/responses/Unauthorized'

        '400':
          description: Invalid input, invalid ID, or invalid fieldlog data
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: string
                example:
                  errors:
                    - 'Invalid input'
                    - 'Id is not a positive integer'
                    - 'Invalid fieldlog data'
    delete:
      security:
        - bearerAuth: []
      tags:
        - Logs
      summary: Delete a fieldlog
      description: Delete a fieldlog owned by the user
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '204':
          description: Fieldlog sucessfully deleted
        
        '404':
          $ref: '#/components/responses/NotFound'

        '403':
          $ref: '#/components/responses/Forbidden'
      
        '401':
          $ref: '#/components/responses/Unauthorized'

        '400':
          $ref: '#/components/responses/InvalidId'

  /collections:
    get:
      security:
        - bearerAuth: []
      tags:
        - Collections
      summary: Get all collections
      description: Retrieve a list of collections owned by the user.
      parameters:
        - $ref: '#/components/parameters/QueryName'
      responses:
        '200':
          description: A list of collections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Collection'

        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      security:
        - bearerAuth: []
      tags:
        - Collections
      summary: Create a new collection
      description: Create a new collection
      requestBody:
        description: The new collection to create.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Collection'
      responses:
        '201':
          description: Collection successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collection'

        '409':
          $ref: '#/components/responses/DuplicateName'
          
        '400':
          $ref: '#/components/responses/InvalidInput'

        '401':
          $ref: '#/components/responses/Unauthorized'

  /collections/{id}:
    get:
      security:
        - bearerAuth: []
      tags:
        - Collections
      summary: Get a collection by id
      description: Retrieve a single collection by its ID, owned by the user
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: A single collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collection'
        
        '404':
          $ref: '#/components/responses/NotFound'

        '403':
          $ref: '#/components/responses/Forbidden'
      
        '401':
          $ref: '#/components/responses/Unauthorized'

        '400':
          $ref: '#/components/responses/InvalidId'
    put:
      security:
        - bearerAuth: []
      tags:
        - Collections
      summary: Update a collection
      description: Update a collection owned by the user
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        description: Updated collection data.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Collection'
      responses:
        '200':
          description: Updated collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collection'
        
        '409':
          $ref: '#/components/responses/DuplicateName'

        '404':
          $ref: '#/components/responses/NotFound'

        '403':
          $ref: '#/components/responses/Forbidden'
      
        '401':
          $ref: '#/components/responses/Unauthorized'

        '400':
          description: Invalid input, invalid ID, or invalid collection name
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: string
                example:
                  errors:
                    - 'Invalid input'
                    - 'Id is not a positive integer'
                    - 'Invalid collection name'
    delete:
      security:
        - bearerAuth: []
      tags:
        - Collections
      summary: Delete a collection
      description: Delete a collection owned by the user
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '204':
          description: Collection sucessfully deleted
        
        '404':
          $ref: '#/components/responses/NotFound'

        '403':
          $ref: '#/components/responses/Forbidden'
      
        '401':
          $ref: '#/components/responses/Unauthorized'

        '400':
          $ref: '#/components/responses/InvalidId'

  /tags:
    get:
      tags:
        - Tags
      summary: Get all tags
      description: Retrieve a list of all tags.
      parameters:
        - $ref: '#/components/parameters/QueryName'
      responses:
        '200':
          description: A list of tags
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Tag'
          
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      security:
        - bearerAuth: []
      tags:
        - Tags
      summary: Create a new tag
      description: Create a new global tag
      requestBody:
        description: The new tag to create.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Tag'
      responses:
        '201':
          description: Tag successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tag'

        '409':
          $ref: '#/components/responses/DuplicateName'
          
        '401':
          $ref: '#/components/responses/Unauthorized'
          
        '400':
          $ref: '#/components/responses/InvalidInput'

  /tags/{id}:
    get:
      tags:
        - Tags
      summary: Get a tag by id
      description: Retrieve a single tag by its ID.
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: A single tag
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tag'

        '404':
          $ref: '#/components/responses/NotFound'

        '400':
          $ref: '#/components/responses/InvalidId'
    put:
      security:
        - bearerAuth: []
      tags:
        - Tags
      summary: Update a tag
      description: Update a tag name if the user is an admin
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        description: Updated tag data.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Tag'
      responses:
        '200':
          description: Updated tag
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tag'
        
        '409':
          $ref: '#/components/responses/DuplicateName'

        '404':
          $ref: '#/components/responses/NotFound'

        '403':
          $ref: '#/components/responses/Forbidden'
      
        '401':
          $ref: '#/components/responses/Unauthorized'

        '400':
          description: Invalid input, invalid ID, or invalid tag name
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: string
                example:
                  errors:
                    - 'Invalid input'
                    - 'Id is not a positive integer'
                    - 'Invalid tag name'
    delete:
      security:
        - bearerAuth: []
      tags:
        - Tags
      summary: Delete a tag
      description: Delete a tag if the user is an admin
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '204':
          description: Tag sucessfully deleted
        
        '404':
          $ref: '#/components/responses/NotFound'

        '403':
          $ref: '#/components/responses/Forbidden'
      
        '401':
          $ref: '#/components/responses/Unauthorized'

        '400':
          $ref: '#/components/responses/InvalidId'


  /auth/signup:
    post:
      tags:
        - Auth
      summary: Create a new user
      description: Authenticate a user and return an access token.
      requestBody:
        description: User login credentials
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupCredentials'
      responses:
        '201':
          description: Authentication successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  email:
                    type: string
                  role:
                    type: string
                example:
                  email: 'user@example.com'
                  role: 'USER'
        '400':
          $ref: '#/components/responses/InvalidUserInput'
        '409':
          $ref: '#/components/responses/DuplicateEmail'

  /auth/login:
    post:
      tags:
        - Auth
      summary: Authenticate user
      description: Authenticate a user and return an access token.
      requestBody:
        description: User login credentials
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginCredentials'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                example:
                  accessToken: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'
        '400':
          $ref: '#/components/responses/InvalidUserInput'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                example:
                  error: 'Invalid credentials'

components:
  schemas:
    Fieldlog:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          example: 1
        name:
          type: string
          example: "A cool Sequoia!"
        description:
          type: string
          example: "A big sequoia I found in the national park!"
        collection:
          type: string
          example: "Trees"
        tags:
          type: array
          items:
            type: string
          example:
            - "Trees"
            - "Forest"
        ownerId:
          type: integer
          readOnly: true
          example: 1
    FieldlogUpdate:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          example: 1
        name:
          type: string
          example: "A cool Sequoia!"
        description:
          type: string
          example: "A big sequoia I found in the national park!"
        collection:
          type: string
          readOnly: true
          example: "Trees"
        tags:
          type: array
          items:
            type: string
          example:
            - "Trees"
            - "Forest"
        ownerId:
          type: integer
          readOnly: true
          example: 1
    Collection:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          example: 1
        name:
          type: string
          example: "Trees"
        ownerId:
          type: integer
          readOnly: true
          example: 1
    Tag:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          example: 1
        name:
          type: string
          example: "Fish"
    SignupCredentials:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      example:
        email: 'user@example.com'
        password: 'password123'
    LoginCredentials:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      example:
        email: 'user@example.com'
        password: 'password123'
        rememberMe: false

  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      description: Resource ID
      schema:
        type: integer
        example: 1

    QueryName:
      name: name
      in: query
      required: false
      description: Search by name
      schema:
        type: string
        example: 'Fish'

    QueryCollection:
      name: collection
      in: query
      required: false
      description: Search by collection
      schema:
        type: string
        example: 'Fish'

    QueryTag:
      name: tag
      in: query
      required: false
      description: Search by tag
      schema:
        type: array
        items:
          type: string
        example:
          - 'Buildings'
          - 'Trees'
          - 'Fish'
      
  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
            example:
              error: 'Resource 1 not found'

    InvalidId:
      description: Invalid ID
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  type: string
            example:
              errors: ['ID must be a positive integer']

    InvalidInput:
      description: Bad request due to invalid data
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  type: string
            example:
              errors:
                - 'Name must be at least 3 characters'

    Unauthorized:
      description: Client is not authenticated
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
            example:
              error: 'Not authenticated. Please provide a valid token'

    Forbidden:
      description: Client is not authorized
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
            example:
              error: 'Not authorized. Client is authenticated, but not authorized to view this content'

    InvalidUserInput:
      description: Bad request due to bad data
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  type: string
            example:
              errors:
                - 'Email is required'
                - 'Password is required'
                - 'Remember me must be true or false'

    DuplicateEmail:
      description: Cannot create an account with an email that has already been used
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
            example:
              error: 'Email has already been used'

    DuplicateName:
      description: Name must be unique
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
            example:
              error: 'Name already exists'

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
